name: Notify Beta App Update

on:
  push:
    branches: [main]
    paths:
      - app-release-beta.json

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Send beta update notifications
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DISCORD_BETA_WEBHOOK_URL: ${{ secrets.DISCORD_BETA_WEBHOOK_URL }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const crypto = require("crypto");

          const manifestPath = "app-release-beta.json";
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);

          async function getAccessToken() {
            const now = Math.floor(Date.now() / 1000);
            const header = Buffer.from(JSON.stringify({ alg: "RS256", typ: "JWT" })).toString("base64url");
            const claim = Buffer.from(JSON.stringify({
              iss: serviceAccount.client_email,
              scope: "https://www.googleapis.com/auth/firebase.messaging",
              aud: "https://oauth2.googleapis.com/token",
              iat: now,
              exp: now + 3600
            })).toString("base64url");
            const unsigned = `${header}.${claim}`;
            const signature = crypto.createSign("RSA-SHA256").update(unsigned).sign(serviceAccount.private_key, "base64url");
            const jwt = `${unsigned}.${signature}`;

            const res = await fetch("https://oauth2.googleapis.com/token", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: new URLSearchParams({
                grant_type: "urn:ietf:params:oauth:grant-type:jwt-bearer",
                assertion: jwt
              })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(JSON.stringify(data));
            return data.access_token;
          }

          async function sendFirebase(token) {
            const res = await fetch(
              `https://fcm.googleapis.com/v1/projects/${serviceAccount.project_id}/messages:send`,
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${token}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  message: {
                    topic: "app-updates-beta",
                    android: { priority: "HIGH" },
                    data: {
                      type: "app_update",
                      versionCode: String(manifest.versionCode),
                      version: String(manifest.version),
                      description: String(manifest.description || manifest.body || ""),
                      download_url: String(manifest.download_url || ""),
                      play_url: String(manifest.play_url || "")
                    }
                  }
                })
              }
            );

            const text = await res.text();
            if (!res.ok) throw new Error(text);
            console.log(`${manifestPath} -> app-updates-beta: ${text}`);
          }

          function trimDiscordText(value, maxLength) {
            const text = String(value || "").trim();
            if (text.length <= maxLength) return text;
            return `${text.slice(0, maxLength - 3)}...`;
          }

          async function sendDiscord() {
            const webhook = process.env.DISCORD_BETA_WEBHOOK_URL;
            if (!webhook) {
              console.log("DISCORD_BETA_WEBHOOK_URL is not set; skipping Discord beta notification");
              return;
            }

            const notes = manifest.body || manifest.description || "A new beta build is available.";
            const version = String(manifest.version || "beta");
            const displayVersion = version.startsWith("v") ? version : `v${version}`;
            const downloadUrl = String(manifest.download_url || "");
            const payload = {
              username: "Rivals DB Updates",
              embeds: [
                {
                  title: `Rivals DB ${displayVersion} is available`,
                  description: trimDiscordText(notes, 3500),
                  color: 15105570,
                  fields: [
                    {
                      name: "Channel",
                      value: "Beta",
                      inline: true
                    },
                    {
                      name: "Version",
                      value: displayVersion,
                      inline: true
                    }
                  ],
                  footer: {
                    text: "Beta build"
                  },
                  timestamp: new Date().toISOString()
                }
              ]
            };
            if (downloadUrl) {
              payload.components = [
                {
                  type: 1,
                  components: [
                    {
                      type: 2,
                      style: 5,
                      label: "Download APK",
                      url: downloadUrl
                    }
                  ]
                }
              ];
            }
            const res = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });

            const text = await res.text();
            if (!res.ok) throw new Error(`Discord beta webhook failed: ${text}`);
            console.log(`${manifestPath} -> Discord beta webhook`);
          }

          async function main() {
            const token = await getAccessToken();
            await sendFirebase(token);
            await sendDiscord();
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          NODE
